six_system_questions:
  business_loop: A future bounded BUW request is admitted, policy checked, dry-run planned, explicitly approved where required, adapter-executed, audited and reconciled; this Stage performs design only.
  core_objects: Governed request, company/brand scope, workflow version, policy decision, approval, run, idempotency key, audit event, connector command and reconciliation result.
  data_flow: Synthetic input crosses admission and policy into a stateless orchestrator; future durable control and audit stores retain evidence; connector egress remains disabled.
  operators: Abstract Governance Approver, Security Reviewer, Platform Operator, Runtime Service Identity, Read-only Auditor and Connector Service Identity; no person is assigned.
  ai_human_boundary: Deterministic controls validate and fail closed; humans alone approve architecture, identities, secrets, connectors, risk, pilot and release.
  proof: Read-only validation and negative tests prove design completeness and denial boundaries; implementation requires separately authorized non-production evidence.

business_boundaries:
  BUW: Independent US brand and the sole possible future project brand scope.
  PC: Independent US brand excluded from BUW project requests and results.
  汇沣电商: Company boundary containing separate BUW and PC brand scopes; not identical to BUW.
  六合通: Separate international freight-forwarding company excluded from BUW AIOS.
  cross_boundary_default: deny

trust_zones:
  - {id: governance_control, purpose: Versioned policy and approvals, provisioned: false, owner_state: unassigned / governance decision required}
  - {id: human_access, purpose: Future authenticated human review surface, provisioned: false, owner_state: unassigned / governance decision required}
  - {id: ingress_policy, purpose: Envelope validation and policy decision, provisioned: false, owner_state: unassigned / governance decision required}
  - {id: orchestration_runtime, purpose: Stateless workflow planning and coordination, provisioned: false, owner_state: unassigned / governance decision required}
  - {id: durable_control_state, purpose: Future run and idempotency ledger, provisioned: false, owner_state: unassigned / governance decision required}
  - {id: audit_observability, purpose: Future append-only evidence and telemetry, provisioned: false, owner_state: unassigned / governance decision required}
  - {id: connector_boundary, purpose: Future isolated and allowlisted adapters, provisioned: false, owner_state: unassigned / governance decision required}
  - {id: external_business_systems, purpose: Out-of-scope systems with no Stage 11 access, provisioned: false, owner_state: unassigned / governance decision required}

