identity_and_access:
  least_privilege_default: deny
  identities_created: false
  authentication_design: Future approved identity provider for humans and workload identity for services.
  authorization_dimensions: [environment, company, brand, workflow, action, resource]
  abstract_roles:
    - Governance Approver
    - Security Reviewer
    - Platform Operator
    - Runtime Service Identity
    - Read-only Auditor
    - Connector Service Identity
  separation_of_duties: No runtime or connector role may approve its own identity, risk or release.

secrets_lifecycle:
  design_only: true
  secrets_created: false
  phases: [request, explicit_approval, issue, workload_retrieval, adapter_local_use, rotate, revoke, audit]
  fail_closed_conditions: [retrieval_failure, rotation_failure, revocation_uncertain, audit_failure]
  prohibited_locations: [source_control, workflow_payload, logs, human_messages]

persistence_and_audit:
  implementation_status: proposed_only
  durable_run_ledger: Records state transitions and immutable workflow versions.
  idempotency_store: Reserves a company-brand-workflow-action scoped key before any future action.
  audit_store: Append-only ordered events with identity, policy and approval references and no secret material.
  unknown_state_behavior: stop_and_require_human_review

connector_boundary:
  default: deny
  enabled_connectors: []
  external_writes_allowed: false
  adapter_isolation_required: true
  allowlist_dimensions: [company, brand, system, action, resource]
  uncertain_outcome_behavior: stop_and_reconcile_before_retry

capacity_and_failure_assumptions:
  measured_capacity: false
  throughput_claim: none
  availability_claim: none
  rto_claim: none
  rpo_claim: none
  fail_closed_dependencies: [identity_provider, policy_store, run_ledger, audit_store, connector]
  stop_conditions: [duplicate, timeout, partial_result, stale_policy, cross_boundary, unknown_state]

decision:
  result: design_review_candidate
  production_ready: false
  deployment_authorized: false
  pilot_authorized: false
  release_authorized: false
  risk_acceptance_granted: false
