six_system_questions:
  business_loop: A declared synthetic request is scope checked, purpose and basis referenced, minimized, access and retention evaluated, then allowed or denied in memory with audit reasons.
  core_objects: Data asset, subject type, category, purpose, basis decision, consent or preference reference, role, access policy, retention rule, subject request, lineage and audit event.
  data_flow: Repository-owned synthetic fixtures are evaluated in memory against versioned YAML policy and no source, destination or external system is connected.
  operators: Abstract governance, privacy, legal, data steward, security, auditor and runtime roles only; no real person is assigned.
  ai_human_boundary: Deterministic checks validate declared facts and fail closed; humans alone decide legal basis, exceptions, real-data access, fulfillment, risk and release.
  proof: Positive and negative synthetic tests plus pull-request-only read-only CI prove package consistency and denial behavior only.

