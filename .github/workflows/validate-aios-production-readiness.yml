name: Validate AIOS Production Readiness Assessment

on:
  pull_request:
    paths:
      - "Governance/AIOS-Production-Readiness-*.md"
      - "Governance/AIOS-Production-Readiness-*.yaml"
      - "Governance/AIOS-Stage-Registry.md"
      - "Tests/AIOS-Production-Readiness-Validation.md"
      - "Tests/test_production_readiness.py"
      - "Tests/validate_aios_production_readiness.py"
      - ".github/workflows/validate-aios-production-readiness.yml"

permissions:
  contents: read

concurrency:
  group: aios-production-readiness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate prepare-only readiness evidence
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Validate Stage 10 readiness evidence
        run: python Tests/validate_aios_production_readiness.py

      - name: Run Stage 10 positive and negative tests
        run: python -m unittest Tests.test_production_readiness -v
