name: Validate AIOS Operational Resilience

on:
  pull_request:
    paths:
      - "Governance/AIOS-Operational-Resilience-*"
      - "Governance/AIOS-Stage-Registry.md"
      - "Governance/AIOS-Project-Registry.md"
      - "Tests/AIOS-Operational-Resilience-Validation.md"
      - "Tests/Fixtures/operational-resilience/**"
      - "Tests/test_operational_resilience.py"
      - "Tests/test_project_governance.py"
      - "Tests/validate_aios_operational_resilience.py"
      - "docs/superpowers/specs/2026-07-22-operational-resilience-v1-design.md"
      - "docs/superpowers/plans/2026-07-22-operational-resilience-v1.md"
      - ".github/workflows/validate-aios-operational-resilience.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate synthetic resilience package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out without persisted credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Validate operational resilience package
        run: python Tests/validate_aios_operational_resilience.py
      - name: Run Stage 13 positive and negative tests
        run: python -m unittest Tests.test_operational_resilience -v
      - name: Run repository regression tests
        run: python -m unittest discover -s Tests -p 'test_*.py' -v
      - name: Validate Workflow Schema
        run: python Tests/validate_aios_workflow_schema.py
      - name: Compile Python sources
        run: python -m compileall -q Runtime Tests
