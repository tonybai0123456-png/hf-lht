name: Validate AIOS Privacy and Data Governance

on:
  pull_request:
    paths:
      - "Governance/AIOS-Privacy-Data-Governance-*"
      - "Governance/AIOS-Stage-Registry.md"
      - "Governance/AIOS-Project-Registry.md"
      - "Tests/AIOS-Privacy-Data-Governance-Validation.md"
      - "Tests/test_privacy_data_governance.py"
      - "Tests/validate_aios_privacy_data_governance.py"
      - "docs/superpowers/specs/2026-07-22-privacy-data-governance-v1-design.md"
      - "docs/superpowers/plans/2026-07-22-privacy-data-governance-v1.md"
      - ".github/workflows/validate-aios-privacy-data-governance.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate synthetic privacy policy package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out without persisted credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Validate privacy and data governance package
        run: python Tests/validate_aios_privacy_data_governance.py
      - name: Run Stage 12 positive and negative tests
        run: python -m unittest Tests.test_privacy_data_governance -v
      - name: Run repository regression tests
        run: python -m unittest discover -s Tests -p 'test_*.py' -v
      - name: Validate Workflow Schema
        run: python Tests/validate_aios_workflow_schema.py
      - name: Compile Python sources
        run: python -m compileall -q Runtime Tests
