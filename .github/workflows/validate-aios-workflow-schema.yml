name: Validate AIOS Workflow Schema

on:
  pull_request:
    paths:
      - "Schemas/**"
      - "Tests/validate_aios_workflow_schema.py"
      - "requirements-dev.txt"
      - ".github/workflows/validate-aios-workflow-schema.yml"
  push:
    branches:
      - feat/aios-workflow-schema-v1
    paths:
      - "Schemas/**"
      - "Tests/validate_aios_workflow_schema.py"
      - "requirements-dev.txt"
      - ".github/workflows/validate-aios-workflow-schema.yml"

permissions:
  contents: read

concurrency:
  group: aios-workflow-schema-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate schema and workflow instances
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Run AIOS Workflow Schema validation
        run: python Tests/validate_aios_workflow_schema.py
