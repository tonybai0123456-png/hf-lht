name: Validate Runtime Orchestrator v1

on:
  pull_request:
    paths:
      - "Runtime/**"
      - "Schemas/**"
      - "Tests/**"
      - "requirements-dev.txt"
      - ".github/workflows/validate-runtime-orchestrator.yml"

permissions:
  contents: read

concurrency:
  group: runtime-orchestrator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate synthetic Runtime Orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Validate Workflow Schema and published instances
        run: python Tests/validate_aios_workflow_schema.py

      - name: Run existing Controlled Harness tests
        run: python -m unittest Tests.test_controlled_orchestrator -v

      - name: Run Runtime Orchestrator tests
        run: python -m unittest Tests.test_runtime_orchestrator -v
